name: CI

on:
  push:
  pull_request:

# The app lives in the ClimbCycle/ subfolder of the repo.
defaults:
  run:
    working-directory: ClimbCycle

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Tests are zero-dependency: run them before installing anything.
      - name: Run tests
        run: node test/run.js

      - name: Install dev tooling (ESLint)
        run: npm install

      - name: Lint
        run: npm run lint
